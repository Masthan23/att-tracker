<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#a21caf">
    <title>AttendPro × Dashverse</title>
    <style>
        html, body { height:100%; margin:0; }
        body { display:flex; align-items:center; justify-content:center; background: radial-gradient(ellipse 100% 70% at 50% -20%, rgba(192,38,211,.25) 0%, transparent 55%), linear-gradient(165deg, #030014 0%, #12081f 55%, #030014 100%); color:#fff; font-family:system-ui, sans-serif; overflow:hidden; }
        .boot-splash { display:flex; flex-direction:column; gap:24px; align-items:center; justify-content:center; text-align:center; padding:24px; }
        .boot-splash__brand { font-size:2.3rem; font-weight:900; letter-spacing:-.03em; text-shadow:0 12px 40px rgba(232,121,249,.35); }
        .boot-splash__brand span { background:linear-gradient(135deg,#f0abfc,#22d3ee,#fde68a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .boot-splash__tag { font-size:.85rem; letter-spacing:.24em; text-transform:uppercase; opacity:.8; }
        .ap-loader { position:relative; width:min(240px,52vw); height:min(240px,52vw); max-width:260px; max-height:260px; display:grid; place-items:center; perspective:1200px; }
        .ap-loader__spin { position:absolute; inset:0; display:grid; place-items:center; transform-style:preserve-3d; animation:ap-orbit 14s linear infinite; }
        .ap-loader__ring { position:absolute; inset:0; border-radius:50%; border:3px solid transparent; border-top-color:rgba(232,121,249,.88); border-right-color:rgba(124,58,237,.4); box-shadow:0 0 32px rgba(232,121,249,.3); }
        .ap-loader__ring:nth-child(2) { inset:12%; transform:rotateY(56deg); border-top-color:rgba(124,58,237,.75); }
        .ap-loader__ring:nth-child(3) { inset:24%; transform:rotateX(52deg); border-top-color:rgba(34,211,238,.55); }
        .dv-gem-wrap { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; transform-style:preserve-3d; }
        .dv-gem-bloom { position:absolute; inset:-30%; border-radius:40%; background:radial-gradient(circle, rgba(232,121,249,.35) 0%, transparent 70%); filter:blur(20px); animation:dvBloom 2.8s ease-in-out infinite alternate; }
        .dv-gem-img { width:48%; aspect-ratio:1; border-radius:28px; background:rgba(255,255,255,.18); box-shadow:0 0 0 1px rgba(255,255,255,.18), 0 24px 52px rgba(0,0,0,.28); overflow:hidden; display:flex; align-items:center; justify-content:center; }
        .dv-gem-img img { width:100%; height:100%; object-fit:cover; display:block; }
        @keyframes ap-orbit { from { transform:rotateX(58deg) rotateZ(0deg); } to { transform:rotateX(58deg) rotateZ(360deg); } }
        @keyframes dvBloom { from { opacity:.55; transform:scale(.92); } to { opacity:1; transform:scale(1.08); } }
    </style>
</head>
<body>
    <div class="boot-splash" role="status" aria-live="polite">
        <div class="ap-loader" aria-hidden="true">
            <div class="ap-loader__spin">
                <div class="ap-loader__ring"></div>
                <div class="ap-loader__ring"></div>
                <div class="ap-loader__ring"></div>
                <div class="dv-gem-wrap">
                    <div class="dv-gem-bloom"></div>
                    <div class="dv-gem-img">
                        <img src="1.jpg" alt="AttendPro" decoding="async" onerror="this.style.display='none'" />
                    </div>
                </div>
            </div>
        </div>
        <div class="boot-splash__brand">Attend<span>Pro</span></div>
        <div class="boot-splash__tag">Dashverse · Loading</div>
    </div>
    <script>
        (function(){
            var params = new URLSearchParams(window.location.search);
            var skipSplash = params.get('skipSplash') === '1';
            var redirectDelay = 1700;
            var target = 'app.html';
            function go(){ window.location.href = target; }
            if (skipSplash) {
                var splash = document.querySelector('.boot-splash');
                if (splash) {
                    splash.style.display = 'none';
                }
                go();
                return;
            }
            window.addEventListener('load', function(){ setTimeout(go, redirectDelay); });
            setTimeout(function(){ if(document.readyState !== 'complete') go(); }, redirectDelay + 5000);
        })();
    </script>
</body>
</html>
